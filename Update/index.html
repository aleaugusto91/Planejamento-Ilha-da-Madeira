<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planejamento do Apartamento</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: 'Inter', sans-serif; background:#f5f6fa; margin:0; }

/* simplificado visual mantendo estrutura */
.container { padding:20px; max-width:1100px; margin:auto; }
h1 { font-size:20px; margin-bottom:20px; }

.card { background:#fff; padding:16px; border-radius:12px; margin-bottom:12px; }

table { width:100%; border-collapse:collapse; }
td, th { padding:10px; border-bottom:1px solid #eee; }

tr { cursor:pointer; }
tr:hover { background:#fafafa; }

button { padding:10px; border:none; border-radius:8px; cursor:pointer; }
.primary { background:#111; color:#fff; }
.danger { background:#ef4444; color:#fff; }

/* modal */
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; }
.modal.open { display:flex; }

.modal-box {
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

input, select {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Planejamento do Apartamento</h1>

  <div class="card">
    <button class="primary" onclick="abrirNovo()">+ Adicionar</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Categoria</th>
          <th>Status</th>
          <th>Valor</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>
</div>

<!-- NOVO -->
<div class="modal" id="modalNovo">
  <div class="modal-box">
    <h3>Novo item</h3>
    <input id="novoNome" placeholder="Nome">
    <input id="novoCategoria" placeholder="Categoria">
    <input id="novoStatus" placeholder="Status">
    <input id="novoValor" type="number" placeholder="Valor">

    <button class="primary" onclick="salvarNovo()">Salvar</button>
  </div>
</div>

<!-- EDITAR -->
<div class="modal" id="modalEditar">
  <div class="modal-box">
    <h3>Editar item</h3>

    <input id="editNome">
    <input id="editCategoria">
    <input id="editStatus">
    <input id="editValor" type="number">

    <button class="primary" onclick="salvarEdit()">Salvar</button>
    <button class="danger" onclick="excluir()">Excluir</button>
  </div>
</div>

<script>
let dados = [];
let editIndex = null;

function render() {
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  dados.forEach((item, i) => {
    tabela.innerHTML += `
      <tr onclick="editar(${i})">
        <td>${item.nome}</td>
        <td>${item.categoria}</td>
        <td>${item.status}</td>
        <td>R$ ${item.valor}</td>
      </tr>
    `;
  });
}

function abrirNovo() {
  document.getElementById("modalNovo").classList.add("open");
}

function salvarNovo() {
  dados.push({
    nome: novoNome.value,
    categoria: novoCategoria.value,
    status: novoStatus.value,
    valor: Number(novoValor.value)
  });

  document.getElementById("modalNovo").classList.remove("open");
  render();
}

function editar(i) {
  editIndex = i;
  const item = dados[i];

  editNome.value = item.nome;
  editCategoria.value = item.categoria;
  editStatus.value = item.status;
  editValor.value = item.valor;

  document.getElementById("modalEditar").classList.add("open");
}

function salvarEdit() {
  const item = dados[editIndex];

  item.nome = editNome.value;
  item.categoria = editCategoria.value;
  item.status = editStatus.value;
  item.valor = Number(editValor.value);

  document.getElementById("modalEditar").classList.remove("open");
  render();
}

function excluir() {
  dados.splice(editIndex, 1);
  document.getElementById("modalEditar").classList.remove("open");
  render();
}

render();
</script>

</body>
</html>
